<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#1a1815" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f7f4ee" media="(prefers-color-scheme: light)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SendTemps" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="description" content="Australian climbing conditions forecast — score and rank crags by weather across VIC, NSW, TAS, SA, and WA." />

    <!-- Open Graph -->
    <meta property="og:title" content="SendTemps — Australian Climbing Forecast" />
    <meta property="og:description" content="Score and rank crags by weather. Forecasts for VIC, NSW, TAS, SA, and WA." />
    <meta property="og:image" content="https://sendtemps.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="https://sendtemps.app/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="SendTemps" />

    <!-- Twitter/X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SendTemps — Australian Climbing Forecast" />
    <meta name="twitter:description" content="Score and rank crags by weather. Forecasts for VIC, NSW, TAS, SA, and WA." />
    <meta name="twitter:image" content="https://sendtemps.app/og-image.png" />

    <title>SendTemps — Australian Climbing Forecast</title>

    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="icon-180.png" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />

    <!-- Fontshare: General Sans (display) + Switzer (body) — both clean, high-legibility sans-serifs -->
    <link
      href="https://api.fontshare.com/v2/css?f[]=general-sans@500,600,700&f[]=switzer@400,500,600,700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css?v=63.2" />
  </head>

  <body>
    <header class="topbar">
      <div class="brand">
        <svg class="brand-mark" width="28" height="28" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M3 26 L11 12 L17 19 L22 9 L29 26 Z" />
          <circle cx="22" cy="6" r="1.6" fill="currentColor" stroke="none" />
        </svg>
        <h1>SendTemps</h1>
      </div>
      <div class="topbar-actions">
        <button class="notify-toggle" id="notify-btn" aria-label="Enable rare window alerts" title="Rare window alerts"></button>
        <button class="theme-toggle" data-theme-toggle aria-label="Toggle dark mode"></button>
      </div>
    </header>

    <main id="app">
      <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>Reading the wind…</p>
      </div>

      <div id="content" hidden>
        <section class="weekend-tabs" id="day-tabs" role="tablist" aria-label="Forecast day"></section>

        <section class="region-filter-bar" id="region-filter" aria-label="State filter"></section>

        <section class="day-summary" id="day-summary" aria-live="polite"></section>

        <section class="ranked-list" id="ranked-list"></section>

        <footer class="footnote">
          <p>Forecast: <a href="https://open-meteo.com/" target="_blank" rel="noopener">Open-Meteo</a>. Conditions are predictions — always check on arrival. Aspect, dry-time and ideal-temp ratings are author's notes, not gospel.</p>
          <p class="updated" id="updated"></p>
        </footer>
      </div>

      <div class="error" id="error" hidden>
        <h2>Couldn't fetch forecast</h2>
        <p id="error-message"></p>
        <button id="retry">Retry</button>
      </div>
    </main>

    <script type="module" src="app.js?v=63.2"></script>

    <!--
      GoatCounter analytics — cookie-free, no banner needed.
      Tracks pageviews + screen size + referrer; no personal data.
      Dashboard: https://sendtemps.goatcounter.com
    -->
    <script
      data-goatcounter="https://sendtemps.goatcounter.com/count"
      async
      src="//gc.zgo.at/count.js"
    ></script>
    <script>
      // Fire a custom event the first time the page loads so we can split
      // "installed PWA" usage from regular browser visits in GoatCounter.
      // display-mode: standalone is set when launched from the iOS home
      // screen or Android "Add to home screen". navigator.standalone is
      // the older iOS Safari flag. Either one means installed PWA.
      window.addEventListener('load', function () {
        var isStandalone = window.matchMedia('(display-mode: standalone)').matches
          || window.navigator.standalone === true;
        if (!isStandalone) return;
        // Wait a tick for count.js to finish loading, then log the event.
        var ping = function () {
          if (typeof window.goatcounter === 'undefined' || !window.goatcounter.count) {
            return setTimeout(ping, 200);
          }
          window.goatcounter.count({
            path: 'pwa-launch',
            title: 'PWA launch',
            event: true,
          });
        };
        ping();
      });
    </script>
  </body>
</html>
